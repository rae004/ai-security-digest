name: Deploy

# Reusable workflow that runs `cdk deploy --all` against the prod account.
# Two trigger modes:
#
#   - workflow_call: invoked from release-please.yml after a tag is cut.
#     Pass the tag as `ref` so the deployed artifact matches the released
#     version exactly.
#
#   - workflow_dispatch: manual trigger from the Actions UI. Use for
#     incident recovery, hotfix deploys without cutting a release, or to
#     validate OIDC plumbing. Defaults to current main when ref is empty.

on:
  workflow_call:
    inputs:
      ref:
        description: 'Git ref to deploy (tag, branch, or SHA)'
        required: false
        type: string
        default: ''
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to deploy (defaults to current main)'
        required: false
        type: string
        default: ''

permissions:
  contents: read

# Serialize deploys so concurrent triggers (e.g., release + manual dispatch)
# don't fight each other on CFN. cancel-in-progress=false: never abandon a
# half-finished CFN update — let it finish, then run the next one.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: cdk deploy --all (prod)
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      id-token: write   # required for OIDC token exchange
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - run: npm run build

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: gha-deploy-${{ github.run_id }}
          aws-region: us-east-1

      - name: cdk deploy
        run: npx cdk deploy --all --require-approval never --ci --concurrency 4
