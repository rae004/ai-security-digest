version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Chicago"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 10
    groups:
      aws-sdk:
        patterns:
          - "@aws-sdk/*"
      aws-cdk:
        patterns:
          - "aws-cdk"
          - "aws-cdk-lib"
          - "cdk-nag"
          - "constructs"
      typescript-eslint:
        patterns:
          - "@typescript-eslint/*"
      jest:
        patterns:
          - "jest"
          - "ts-jest"
          - "@types/jest"
      types:
        patterns:
          - "@types/*"
        exclude-patterns:
          - "@types/jest"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Chicago"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns:
          - "*"
